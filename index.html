<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matthew's Clothing Store</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Matthew's Clothing Store</h1>
  <button id="menuToggle" aria-label="Open navigation" aria-expanded="false">☰</button>
  <nav id="siteNav">
    <a href="#">Home</a>
    <a href="#products">Shop</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO SECTION WITH OVERLAY -->
<section class="hero">
  <div class="overlay"></div>
  <h2>New Collection 2026</h2>
  <p>Style that defines you.</p>
  <button onclick="scrollToProducts()">Shop Now</button>
</section>

<!-- PRODUCTS -->
<section id="products">
  <h2>Featured Products</h2>
  <div class="product-grid">
    <div class="product">
      <img src="images/gas pump.jpg" alt="Featured product" loading="lazy">
      <h3>Featured Item</h3>
      <p>$49.99</p>
      <button>Add to Cart</button>
    </div>

    <!-- Duplicate this block or add more products as needed -->
    <div class="product">
      <img src="images/pic1.png" alt="Another product" loading="lazy">
      <h3>Another Item</h3>
      <p>$59.99</p>
      <button>Add to Cart</button>
    </div>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About Us</h2>
  <p>Matthews clothing store delivers bryans mustache</p>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>Email: support@matthewsclothing.com</p>
</section>

<footer>
  <p>© 2026 Matthew's Clothing Store</p>
</footer>

<script src="script.js"></script>
</body>
</html>
